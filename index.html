<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Dodge</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; }
  #ui { position: absolute; top: 0; left: 0; width: 100%; pointer-events: none; }
  #hud { display: flex; justify-content: space-between; padding: 12px 16px; color: #fff; font-size: 14px; }
  #lives { color: #ff4466; }
  #score-display { color: #44ffaa; }
  #mute-btn { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; pointer-events: all; font-family: 'Courier New', monospace; }
  #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); color: #fff; text-align: center; }
  #overlay h1 { font-size: 42px; color: #44ffaa; text-shadow: 0 0 20px #44ffaa88; letter-spacing: 4px; margin-bottom: 8px; }
  #overlay p { color: #aaa; margin-bottom: 24px; font-size: 14px; }
  #overlay .score-info { font-size: 18px; color: #44ffaa; margin-bottom: 8px; }
  #overlay .high-score-info { font-size: 14px; color: #ffaa44; margin-bottom: 24px; }
  #start-btn { background: #44ffaa22; border: 2px solid #44ffaa; color: #44ffaa; padding: 12px 32px; font-size: 18px; cursor: pointer; border-radius: 4px; font-family: 'Courier New', monospace; letter-spacing: 2px; transition: background 0.2s; pointer-events: all; }
  #start-btn:hover { background: #44ffaa44; }
  #boss-warning { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; text-align: center; }
  #boss-warning .warn-main { font-size: 32px; color: #ff4466; font-weight: bold; letter-spacing: 4px; text-shadow: 0 0 20px #ff4466; animation: flash 0.4s infinite; }
  #boss-warning .warn-sub { font-size: 14px; color: #ffaa44; letter-spacing: 2px; margin-top: 10px; text-shadow: 0 0 10px #ffaa44; }
  @keyframes flash { 0%,100%{opacity:1} 50%{opacity:0} }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="hud">
    <div id="lives">❤️ ❤️ ❤️</div>
    <div id="score-display">SCORE: 0</div>
  </div>
  <button id="mute-btn">🔊 MUTE</button>
  <div id="boss-warning">
    <div class="warn-main">⚠️ BOSS INCOMING ⚠️</div>
    <div class="warn-sub">DODGE PAST IT!</div>
  </div>
</div>
<div id="overlay">
  <h1>SPACE DODGE</h1>
  <p>Dodge asteroids · Survive the gauntlet</p>
  <div class="score-info" id="last-score" style="display:none"></div>
  <div class="high-score-info" id="hi-score-display" style="display:none"></div>
  <button id="start-btn">LAUNCH 🚀</button>
  <p style="margin-top:16px; font-size:12px; color:#555">W·S or ↑↓ = up/down &nbsp;|&nbsp; A·D or ←→ = left/right &nbsp;|&nbsp; Mobile: tap quadrants</p>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('start-btn');
const bossWarning = document.getElementById('boss-warning');
const muteBtn = document.getElementById('mute-btn');

let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const AC = new (window.AudioContext || window.webkitAudioContext)();
let muted = false;
muteBtn.onclick = () => { muted = !muted; muteBtn.textContent = muted ? '🔇 UNMUTE' : '🔊 MUTE'; };

let musicNodes = [], musicPlaying = false, musicTempo = 0.4;

function note(freq, start, dur, vol=0.3, type='square') {
  if (muted) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(0, AC.currentTime + start);
  g.gain.linearRampToValueAtTime(vol, AC.currentTime + start + 0.01);
  g.gain.linearRampToValueAtTime(0, AC.currentTime + start + dur - 0.01);
  o.start(AC.currentTime + start); o.stop(AC.currentTime + start + dur);
  musicNodes.push(o);
}

function playMusic(boss=false) {
  stopMusic(); musicPlaying = true;
  const t = musicTempo;
  const melody = boss ?
    [220,261,220,196,220,261,196,174,220,261,220,261,293,261,220,196] :
    [330,392,440,392,330,293,330,392,440,494,440,392,330,293,261,293];
  const bass = boss ? [55,55,65,55,55,55,65,55] : [110,110,130,110,110,130,110,110];
  melody.forEach((f,i) => note(f, i*t, t*0.85, boss?0.18:0.15));
  bass.forEach((f,i) => { note(f,i*t*2,t*1.8,0.12,'sawtooth'); note(f*2,i*t*2,t*0.3,0.08); });
  const loopTime = melody.length * t * 1000;
  if (musicPlaying) setTimeout(() => { if(musicPlaying) playMusic(boss); }, loopTime);
}

function stopMusic() {
  musicPlaying = false;
  musicNodes.forEach(n => { try { n.stop(); } catch(e){} });
  musicNodes = [];
}

function sfx(type) {
  if (muted) return;
  if (type === 'hit') {
    const o = AC.createOscillator(), g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.frequency.setValueAtTime(200, AC.currentTime);
    o.frequency.linearRampToValueAtTime(50, AC.currentTime+0.3);
    g.gain.setValueAtTime(0.4, AC.currentTime);
    g.gain.linearRampToValueAtTime(0, AC.currentTime+0.3);
    o.start(); o.stop(AC.currentTime+0.3);
  }
  if (type === 'shoot') {
    const o = AC.createOscillator(), g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.frequency.setValueAtTime(600, AC.currentTime);
    o.frequency.linearRampToValueAtTime(180, AC.currentTime+0.12);
    g.gain.setValueAtTime(0.15, AC.currentTime);
    g.gain.linearRampToValueAtTime(0, AC.currentTime+0.12);
    o.start(); o.stop(AC.currentTime+0.12);
  }
  if (type === 'gameover') {
    [200,150,100].forEach((f,i) => {
      const o = AC.createOscillator(), g = AC.createGain();
      o.connect(g); g.connect(AC.destination);
      o.frequency.value = f;
      g.gain.setValueAtTime(0.3, AC.currentTime+i*0.3);
      g.gain.linearRampToValueAtTime(0, AC.currentTime+i*0.3+0.25);
      o.start(AC.currentTime+i*0.3); o.stop(AC.currentTime+i*0.3+0.25);
    });
  }
}

const stars = Array.from({length:150}, () => ({
  x: Math.random()*2000, y: Math.random()*1000,
  s: Math.random()*1.5+0.3, sp: Math.random()*1.5+0.5
}));

let ship, asteroids, bullets, boss, particles;
let score, lives, gameActive, bossSpawned, invincible;
let keys = {};
let touchUp=false, touchDown=false, touchLeft=false, touchRight=false;
let highScore = 0;
let asteroidTimer = 0;
let lastTime = 0;
let gameTime = 0;
let cave = null;
let caveTime = 0;

function initGame() {
  ship = { x: 100, y: H/2, vx: 0, vy: 0, trail: [] };
  asteroids = []; bullets = []; boss = null; particles = [];
  score = 0; lives = 3; gameActive = true; bossSpawned = false; invincible = 0;
  musicTempo = 0.4;
  asteroidTimer = 0;
  gameTime = 0;
  cave = null; caveTime = 0;
  playMusic(false);
}

function spawnAsteroid() {
  const size = 20 + Math.random()*30;
  const speed = (1.5 + score/200) * (0.7 + Math.random()*0.6);
  const numPoints = 7 + Math.floor(Math.random()*4);
  const pts = [];
  for (let i=0; i<numPoints; i++) {
    const angle = (i/numPoints)*Math.PI*2;
    const r = size * (0.7 + Math.random()*0.4);
    pts.push({ dx: Math.cos(angle)*r, dy: Math.sin(angle)*r });
  }
  asteroids.push({
    x: W + size, y: cave ? (cave.center - cave.gap/2 + size + Math.random() * Math.max(1, cave.gap - size*2)) : 60 + Math.random()*(H-120),
    vx: -speed, vy: (Math.random()-0.5)*1.5,
    size, pts, rot: Math.random()*Math.PI*2, rotSpeed: (Math.random()-0.5)*0.04,
    cracks: Array.from({length:3}, () => ({
      ax: (Math.random()-0.5)*size*0.5, ay: (Math.random()-0.5)*size*0.5,
      bx: (Math.random()-0.5)*size*0.8, by: (Math.random()-0.5)*size*0.8
    }))
  });
}

function spawnBoss() {
  bossSpawned = true;
  bossWarning.style.display = 'block';
  setTimeout(() => {
    bossWarning.style.display = 'none';
    boss = { x: W + 80, y: H/2, hp: 20, maxHp: 20, vx: -0.8, vy: 0 };
    playMusic(true);
  }, 2000);
}

// --- Cave ---

function makeCaveSeg(x, segW) {
  return {
    x, phase: Math.random() * Math.PI * 2,
    topJag: 18 + Math.random() * 28,
    botJag: 18 + Math.random() * 28,
    topCracks: Array.from({length:2}, () => ({ ax: Math.random()*segW*0.8, ay: 0, bx: Math.random()*segW*0.6, by: Math.random()*18+4 })),
    botCracks: Array.from({length:2}, () => ({ ax: Math.random()*segW*0.8, ay: 0, bx: Math.random()*segW*0.6, by: -(Math.random()*18+4) }))
  };
}

function makeTurret(x) {
  return {
    x,
    wall: Math.random() < 0.5 ? 'top' : 'bottom',
    timer: Math.floor(Math.random() * 100),
    interval: 110 + Math.floor(Math.random() * 80)
  };
}

function initCave() {
  const segW = 60;
  const count = Math.ceil(W / segW) + 6;
  const turrets = [];
  for (let i = 0; i < 5; i++) turrets.push(makeTurret(W + 220 + i * 270 + Math.random() * 80));
  cave = {
    gap: H * 0.72, center: H / 2, segW,
    segs: Array.from({length: count}, (_, i) => makeCaveSeg(i * segW, segW)),
    turrets
  };
}

function updateCave(dt) {
  caveTime += dt * 0.001;
  const speed = 2 + score / 400;

  cave.segs.forEach(s => s.x -= speed);
  while (cave.segs.length && cave.segs[0].x < -cave.segW - 10) cave.segs.shift();
  while (cave.segs[cave.segs.length - 1].x < W + cave.segW)
    cave.segs.push(makeCaveSeg(cave.segs[cave.segs.length - 1].x + cave.segW, cave.segW));

  cave.turrets.forEach(t => t.x -= speed);
  cave.turrets = cave.turrets.filter(t => t.x > -30);
  const lastT = cave.turrets[cave.turrets.length - 1];
  if (!lastT || lastT.x < W + 80) {
    const newX = lastT ? lastT.x + 250 + Math.random() * 100 : W + 220;
    cave.turrets.push(makeTurret(newX));
  }
}

function drawTurret(t) {
  const topEdge = cave.center - cave.gap / 2;
  const botEdge = cave.center + cave.gap / 2;
  const isTop = t.wall === 'top';
  const ty = isTop ? topEdge : botEdge;
  const dir = isTop ? 1 : -1;

  ctx.save(); ctx.translate(t.x, ty);
  ctx.shadowBlur = 12; ctx.shadowColor = '#ff4422';
  // hull
  ctx.fillStyle = '#aa2200';
  ctx.beginPath();
  ctx.moveTo(0, dir * 16);
  ctx.lineTo(-9, dir * -2);
  ctx.lineTo(-5, dir * -10);
  ctx.lineTo(5, dir * -10);
  ctx.lineTo(9, dir * -2);
  ctx.closePath(); ctx.fill();
  // highlight
  ctx.fillStyle = '#ff5533';
  ctx.beginPath();
  ctx.moveTo(0, dir * 10);
  ctx.lineTo(-4, dir * 0);
  ctx.lineTo(4, dir * 0);
  ctx.closePath(); ctx.fill();
  // gun barrel tip glow
  ctx.shadowBlur = 8; ctx.shadowColor = '#ffaa44';
  ctx.fillStyle = '#ffaa44';
  ctx.beginPath(); ctx.arc(0, dir * 16, 2.5, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0; ctx.restore();
}

function drawCaveWalls() {
  if (!cave || cave.segs.length < 2) return;
  const topEdge = cave.center - cave.gap / 2;
  const botEdge = cave.center + cave.gap / 2;
  const { segs, segW } = cave;
  ctx.save();

  // Top wall fill
  const topGrad = ctx.createLinearGradient(0, 0, 0, topEdge + 50);
  topGrad.addColorStop(0, '#221100'); topGrad.addColorStop(0.65, '#554433'); topGrad.addColorStop(1, '#887766');
  ctx.beginPath(); ctx.moveTo(-10, -5); ctx.lineTo(W + 10, -5); ctx.lineTo(W + 10, topEdge);
  for (let i = segs.length - 1; i >= 0; i--) {
    const s = segs[i]; const jag = s.topJag + Math.sin(caveTime * 1.5 + s.phase) * 3;
    ctx.lineTo(s.x + segW * 0.8, topEdge); ctx.lineTo(s.x + segW * 0.5, topEdge + jag); ctx.lineTo(s.x + segW * 0.2, topEdge);
  }
  ctx.lineTo(-10, topEdge); ctx.closePath(); ctx.fillStyle = topGrad; ctx.fill();
  ctx.strokeStyle = '#998877'; ctx.lineWidth = 1.5; ctx.beginPath();
  segs.forEach((s, i) => {
    const jag = s.topJag + Math.sin(caveTime * 1.5 + s.phase) * 3;
    if (i === 0) ctx.moveTo(s.x + segW * 0.2, topEdge);
    ctx.lineTo(s.x + segW * 0.5, topEdge + jag); ctx.lineTo(s.x + segW * 0.8, topEdge);
  }); ctx.stroke();
  ctx.strokeStyle = '#332211'; ctx.lineWidth = 1;
  segs.forEach(s => s.topCracks.forEach(cr => {
    ctx.beginPath(); ctx.moveTo(s.x + cr.ax, topEdge * 0.4 + cr.ay); ctx.lineTo(s.x + cr.bx, topEdge * 0.4 + cr.by); ctx.stroke();
  }));
  const shimmer = 0.05 + Math.sin(caveTime * 2.5) * 0.02;
  ctx.fillStyle = `rgba(255,230,180,${shimmer})`; ctx.fillRect(0, topEdge - 2, W, 3);

  // Bottom wall fill
  const botGrad = ctx.createLinearGradient(0, H, 0, botEdge - 50);
  botGrad.addColorStop(0, '#221100'); botGrad.addColorStop(0.65, '#554433'); botGrad.addColorStop(1, '#887766');
  ctx.beginPath(); ctx.moveTo(-10, H + 5); ctx.lineTo(W + 10, H + 5); ctx.lineTo(W + 10, botEdge);
  for (let i = segs.length - 1; i >= 0; i--) {
    const s = segs[i]; const jag = s.botJag + Math.sin(caveTime * 1.3 + s.phase + 1.0) * 3;
    ctx.lineTo(s.x + segW * 0.8, botEdge); ctx.lineTo(s.x + segW * 0.5, botEdge - jag); ctx.lineTo(s.x + segW * 0.2, botEdge);
  }
  ctx.lineTo(-10, botEdge); ctx.closePath(); ctx.fillStyle = botGrad; ctx.fill();
  ctx.strokeStyle = '#998877'; ctx.lineWidth = 1.5; ctx.beginPath();
  segs.forEach((s, i) => {
    const jag = s.botJag + Math.sin(caveTime * 1.3 + s.phase + 1.0) * 3;
    if (i === 0) ctx.moveTo(s.x + segW * 0.2, botEdge);
    ctx.lineTo(s.x + segW * 0.5, botEdge - jag); ctx.lineTo(s.x + segW * 0.8, botEdge);
  }); ctx.stroke();
  ctx.strokeStyle = '#332211'; ctx.lineWidth = 1;
  segs.forEach(s => s.botCracks.forEach(cr => {
    const cy = botEdge + (H - botEdge) * 0.3;
    ctx.beginPath(); ctx.moveTo(s.x + cr.ax, cy + cr.ay); ctx.lineTo(s.x + cr.bx, cy + cr.by); ctx.stroke();
  }));
  ctx.fillStyle = `rgba(255,230,180,${shimmer})`; ctx.fillRect(0, botEdge - 1, W, 3);

  // Turrets (drawn on top of rock, embedded at wall edge)
  cave.turrets.forEach(t => drawTurret(t));

  ctx.restore();
}

// --- General helpers ---

function spawnExplosion(x, y, color='#ff8844') {
  for (let i=0; i<12; i++) {
    const angle = Math.random()*Math.PI*2, speed = 1+Math.random()*4;
    particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, life:1, color, size:2+Math.random()*4 });
  }
}

function drawShip(x, y, alpha=1) {
  ctx.save(); ctx.globalAlpha = alpha; ctx.translate(x, y);
  ctx.shadowBlur = 15; ctx.shadowColor = '#4488ff';
  ctx.fillStyle = '#2244aa';
  ctx.beginPath(); ctx.ellipse(-18, 0, 10, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#88ccff';
  ctx.beginPath(); ctx.moveTo(22,0); ctx.lineTo(-14,-12); ctx.lineTo(-10,0); ctx.lineTo(-14,12); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#aaeeff';
  ctx.beginPath(); ctx.ellipse(6,-2,8,5,-0.3,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#4466aa'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0,-6); ctx.lineTo(-12,-12); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,6); ctx.lineTo(-12,12); ctx.stroke();
  const flameLen = 12 + Math.random()*8;
  const grad = ctx.createLinearGradient(-14,0,-14-flameLen,0);
  grad.addColorStop(0,'#ffffff'); grad.addColorStop(0.3,'#4499ff'); grad.addColorStop(1,'rgba(0,50,255,0)');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.moveTo(-14,-5); ctx.lineTo(-14-flameLen,0); ctx.lineTo(-14,5); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawAsteroid(a) {
  ctx.save(); ctx.translate(a.x, a.y); ctx.rotate(a.rot);
  ctx.beginPath(); ctx.moveTo(a.pts[0].dx, a.pts[0].dy);
  for (let i=1; i<a.pts.length; i++) ctx.lineTo(a.pts[i].dx, a.pts[i].dy);
  ctx.closePath();
  const grad = ctx.createRadialGradient(0,0,a.size*0.1,0,0,a.size);
  grad.addColorStop(0,'#887766'); grad.addColorStop(0.6,'#665544'); grad.addColorStop(1,'#443322');
  ctx.fillStyle = grad; ctx.fill();
  ctx.strokeStyle = '#998877'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.strokeStyle = '#332211'; ctx.lineWidth = 1;
  a.cracks.forEach(cr => { ctx.beginPath(); ctx.moveTo(cr.ax,cr.ay); ctx.lineTo(cr.bx,cr.by); ctx.stroke(); });
  ctx.fillStyle = 'rgba(255,240,220,0.15)';
  ctx.beginPath(); ctx.ellipse(-a.size*0.2,-a.size*0.2,a.size*0.3,a.size*0.2,-0.5,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawBoss(b) {
  ctx.save(); ctx.translate(b.x, b.y);
  ctx.shadowBlur = 20; ctx.shadowColor = '#aa44ff';
  ctx.fillStyle = '#662299';
  ctx.beginPath(); ctx.moveTo(60,0); ctx.lineTo(20,-30); ctx.lineTo(-50,-20); ctx.lineTo(-60,0); ctx.lineTo(-50,20); ctx.lineTo(20,30); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#9933ff';
  ctx.beginPath(); ctx.moveTo(40,0); ctx.lineTo(10,-15); ctx.lineTo(-20,-10); ctx.lineTo(-20,10); ctx.lineTo(10,15); ctx.closePath(); ctx.fill();
  ctx.shadowBlur = 0;
  [-18,0,18].forEach(dy => {
    ctx.fillStyle = '#ff4488'; ctx.beginPath(); ctx.ellipse(-55,dy,8,5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffaacc'; ctx.beginPath(); ctx.ellipse(-63,dy,5,3,0,0,Math.PI*2); ctx.fill();
  });
  ctx.fillStyle = '#ff0044'; ctx.shadowBlur = 10; ctx.shadowColor = '#ff0044';
  ctx.beginPath(); ctx.arc(30,-5,8,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffaaaa'; ctx.beginPath(); ctx.arc(32,-7,3,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  const barW = 120;
  ctx.fillStyle = '#330022'; ctx.fillRect(-barW/2,-50,barW,8);
  ctx.fillStyle = '#ff4488'; ctx.fillRect(-barW/2,-50,barW*(b.hp/b.maxHp),8);
  ctx.strokeStyle = '#aa2266'; ctx.lineWidth = 1; ctx.strokeRect(-barW/2,-50,barW,8);
  ctx.restore();
}

function drawBullet(bl) {
  ctx.save(); ctx.shadowBlur = 8; ctx.shadowColor = '#ffff44';
  ctx.fillStyle = '#ffff44'; ctx.beginPath(); ctx.arc(bl.x,bl.y,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(bl.x,bl.y,2,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0; ctx.restore();
}

function updateHUD() {
  const hearts = ['','❤️','❤️ ❤️','❤️ ❤️ ❤️'];
  document.getElementById('lives').textContent = hearts[Math.max(0,lives)] || '';
}

function endGame() {
  gameActive = false; stopMusic(); sfx('gameover');
  if (score > highScore) highScore = score;
  const lastScoreEl = document.getElementById('last-score');
  const hiEl = document.getElementById('hi-score-display');
  lastScoreEl.style.display = 'block'; lastScoreEl.textContent = 'SCORE: ' + Math.floor(score);
  hiEl.style.display = 'block'; hiEl.textContent = '🏆 BEST: ' + Math.floor(highScore);
  startBtn.textContent = 'PLAY AGAIN 🚀';
  overlay.style.display = 'flex';
}

function gameLoop(ts) {
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;

  ctx.fillStyle = '#000010'; ctx.fillRect(0,0,W,H);

  stars.forEach(s => {
    s.x -= s.sp * (1 + score/500);
    if (s.x < 0) { s.x = W+10; s.y = Math.random()*H; }
    ctx.fillStyle = `rgba(255,255,255,${0.3+s.s*0.4})`;
    ctx.beginPath(); ctx.arc(s.x%W, s.y%H, s.s, 0, Math.PI*2); ctx.fill();
  });

  if (!gameActive) { requestAnimationFrame(gameLoop); return; }

  if (keys['ArrowUp'] || keys['w'] || keys['W'] || touchUp) ship.vy -= 0.5;
  if (keys['ArrowDown'] || keys['s'] || keys['S'] || touchDown) ship.vy += 0.5;
  if (keys['ArrowLeft'] || keys['a'] || keys['A'] || touchLeft) ship.vx -= 0.5;
  if (keys['ArrowRight'] || keys['d'] || keys['D'] || touchRight) ship.vx += 0.5;

  ship.vx *= 0.85; ship.vy *= 0.85;
  ship.x += ship.vx; ship.y += ship.vy;
  ship.x = Math.max(20, Math.min(W*0.6, ship.x));
  ship.y = Math.max(30, Math.min(H-30, ship.y));

  // Cave wall collision + turret shooting
  if (cave) {
    updateCave(dt);
    const topEdge = cave.center - cave.gap / 2;
    const botEdge = cave.center + cave.gap / 2;
    if (invincible <= 0 && (ship.y - 14 < topEdge || ship.y + 14 > botEdge)) {
      sfx('hit');
      spawnExplosion(ship.x, ship.y < cave.center ? topEdge : botEdge, '#887766');
      lives--; invincible = 120; updateHUD();
      if (lives <= 0) endGame();
    }
    cave.turrets.forEach(t => {
      t.timer++;
      if (t.timer >= t.interval && t.x > 0 && t.x < W) {
        t.timer = 0;
        sfx('shoot');
        const ty = t.wall === 'top' ? topEdge : botEdge;
        const vy = t.wall === 'top' ? 4 : -4;
        bullets.push({ x: t.x, y: ty, vx: 0, vy });
      }
    });
  }

  ship.trail.unshift({x: ship.x, y: ship.y});
  if (ship.trail.length > 8) ship.trail.pop();
  ship.trail.forEach((pt, i) => {
    ctx.globalAlpha = (1 - i/8) * 0.3;
    ctx.fillStyle = '#2255aa';
    ctx.beginPath(); ctx.arc(pt.x - i*4, pt.y, 4 - i*0.4, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  const shipAlpha = invincible > 0 ? (Math.sin(invincible*0.5) > 0 ? 0.4 : 1) : 1;
  drawShip(ship.x, ship.y, shipAlpha);
  if (invincible > 0) invincible--;

  score += dt * 0.01;
  gameTime += dt;
  musicTempo = Math.max(0.18, 0.4 - score*0.0005);

  asteroidTimer += dt;
  const maxAsteroids = cave ? 5 : Math.min(8, 3 + Math.floor(score / 50));
  const spawnInterval = Math.max(cave ? 800 : 500, (cave ? 1400 : 1100) - score * 3);
  if (asteroidTimer > spawnInterval) {
    asteroidTimer = 0;
    if (asteroids.length < maxAsteroids) {
      const count = score > 150 && Math.random() < 0.3 ? 2 : 1;
      for (let i = 0; i < count && asteroids.length < maxAsteroids; i++) spawnAsteroid();
    }
  }

  asteroids = asteroids.filter(a => {
    a.x += a.vx; a.y += a.vy; a.rot += a.rotSpeed;
    if (a.x < -100) return false;
    drawAsteroid(a);
    if (invincible <= 0 && Math.hypot(a.x-ship.x, a.y-ship.y) < a.size*0.75+14) {
      sfx('hit'); spawnExplosion(a.x, a.y); lives--; invincible = 120; updateHUD();
      if (lives <= 0) endGame();
      return false;
    }
    return true;
  });

  if (!bossSpawned && gameTime > 65000) spawnBoss();
  if (!cave && score > 256) initCave();

  // Boss: moves slowly left, tracks player y, player must dodge past it
  if (boss) {
    boss.x += boss.vx;
    boss.vy += (ship.y - boss.y) * 0.008;
    boss.vy *= 0.92;
    boss.y += boss.vy;

    if (boss.x < -150) {
      // Boss cleared the screen — gauntlet survived
      spawnExplosion(boss.x + 60, boss.y, '#ff44aa');
      boss = null; score += 50;
    } else {
      drawBoss(boss);

      // Ship body collision with boss
      if (invincible <= 0 && Math.hypot(boss.x - ship.x, boss.y - ship.y) < 52) {
        sfx('hit'); spawnExplosion(ship.x, ship.y, '#ff44aa');
        lives--; invincible = 120; updateHUD();
        if (lives <= 0) endGame();
      }

      // Asteroids still damage the boss passively
      asteroids = asteroids.filter(a => {
        if (!boss) return true;
        if (Math.hypot(a.x-boss.x, a.y-boss.y) < a.size+50) {
          spawnExplosion(a.x, a.y, '#aa44ff'); boss.hp--;
          if (boss && boss.hp <= 0) {
            spawnExplosion(boss.x, boss.y, '#ff44aa');
            spawnExplosion(boss.x+30, boss.y-20, '#ffaa44');
            boss = null; score += 50;
          }
          return false;
        }
        return true;
      });
    }
  }

  bullets = bullets.filter(bl => {
    bl.x += bl.vx; bl.y += bl.vy;
    if (bl.x<-10||bl.x>W+10||bl.y<-10||bl.y>H+10) return false;
    drawBullet(bl);
    if (invincible <= 0 && Math.hypot(bl.x-ship.x, bl.y-ship.y) < 16) {
      sfx('hit'); spawnExplosion(bl.x,bl.y,'#ffff44'); lives--; invincible=120; updateHUD();
      if (lives <= 0) endGame();
      return false;
    }
    return true;
  });

  if (cave) drawCaveWalls();

  particles = particles.filter(p => {
    p.x+=p.vx; p.y+=p.vy; p.life-=0.025; p.vx*=0.97; p.vy*=0.97;
    if (p.life<=0) return false;
    ctx.save(); ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); ctx.fill(); ctx.restore();
    return true;
  });

  document.getElementById('score-display').textContent = 'SCORE: ' + Math.floor(score);
  requestAnimationFrame(gameLoop);
}

startBtn.onclick = () => {
  if (AC.state === 'suspended') AC.resume();
  overlay.style.display = 'none';
  initGame();
  requestAnimationFrame(gameLoop);
};

document.addEventListener('keydown', e => { keys[e.key] = true; });
document.addEventListener('keyup', e => { keys[e.key] = false; });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (AC.state === 'suspended') AC.resume();
  Array.from(e.touches).forEach(t => {
    if (t.clientY < H/2 && t.clientX < W/2) touchUp = true;
    if (t.clientY >= H/2 && t.clientX < W/2) touchDown = true;
    if (t.clientX >= W/2 && t.clientY < H/2) { touchUp = true; touchRight = true; }
    if (t.clientX >= W/2 && t.clientY >= H/2) { touchDown = true; touchRight = true; }
  });
}, {passive: false});
canvas.addEventListener('touchend', e => {
  if (e.touches.length === 0) { touchUp=false; touchDown=false; touchLeft=false; touchRight=false; }
});

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
