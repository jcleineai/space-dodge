<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Dodge</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; }
  #ui { position: absolute; top: 0; left: 0; width: 100%; pointer-events: none; }
  #hud { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; color: #fff; font-size: 14px; }
  #p1-lives { color: #ff4466; }
  #p2-lives { color: #ff8833; display: none; }
  #score-display { color: #44ffaa; }
  #mute-btn { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; pointer-events: all; font-family: 'Courier New', monospace; }
  #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); color: #fff; text-align: center; }
  #overlay h1 { font-size: 42px; color: #44ffaa; text-shadow: 0 0 20px #44ffaa88; letter-spacing: 4px; margin-bottom: 8px; }
  #overlay p { color: #aaa; margin-bottom: 24px; font-size: 14px; }
  #overlay .score-info { font-size: 18px; color: #44ffaa; margin-bottom: 8px; }
  #overlay .high-score-info { font-size: 14px; color: #ffaa44; margin-bottom: 24px; }
  .mode-btns { display: flex; gap: 16px; margin-bottom: 16px; }
  .mode-btn { background: #44ffaa22; border: 2px solid #44ffaa; color: #44ffaa; padding: 12px 28px; font-size: 16px; cursor: pointer; border-radius: 4px; font-family: 'Courier New', monospace; letter-spacing: 2px; transition: background 0.2s; pointer-events: all; }
  .mode-btn:hover { background: #44ffaa44; }
  .mode-btn.p2 { border-color: #ff8833; color: #ff8833; background: #ff883322; }
  .mode-btn.p2:hover { background: #ff883344; }
  .mode-btn.online { border-color: #44aaff; color: #44aaff; background: #44aaff22; }
  .mode-btn.online:hover { background: #44aaff44; }
  #extra-life-msg { position: absolute; top: 34%; left: 50%; transform: translate(-50%, -50%); display: none; font-size: 40px; color: #44ffaa; font-weight: bold; letter-spacing: 3px; text-shadow: 0 0 24px #44ffaa, 0 0 8px #fff; pointer-events: none; white-space: nowrap; }
  #pause-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; text-align: center; pointer-events: none; }
  #pause-msg .pause-main { font-size: 64px; color: #44ffaa; font-weight: bold; letter-spacing: 10px; text-shadow: 0 0 30px #44ffaa, 0 0 12px #fff; animation: pausePulse 1.4s ease-in-out infinite; }
  #pause-msg .pause-sub { font-size: 14px; color: #aaa; letter-spacing: 3px; margin-top: 14px; }
  @keyframes pausePulse { 0%,100%{opacity:1} 50%{opacity:0.55} }
  #extra-life-msg.pop { animation: lifepop 1.6s ease-out; }
  @keyframes lifepop {
    0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.5); }
    15%  { opacity: 1; transform: translate(-50%,-50%) scale(1.15); }
    30%  { transform: translate(-50%,-50%) scale(1); }
    80%  { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%,-90%) scale(1); }
  }
</style>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="hud">
    <div id="p1-lives">❤️ ❤️ ❤️</div>
    <div id="score-display">SCORE: 0</div>
    <div id="p2-lives">🧡 🧡 🧡</div>
  </div>
  <button id="mute-btn">🔊 MUTE</button>
  <div id="extra-life-msg">EXTRA LIFE! 🎉</div>
  <div id="pause-msg">
    <div class="pause-main">⏸ PAUSED</div>
    <div class="pause-sub">PRESS P TO RESUME</div>
  </div>
</div>
<div id="overlay">
  <h1>SPACE DODGE</h1>
  <p>Dodge asteroids · Survive the gauntlet</p>
  <div class="score-info" id="last-score" style="display:none"></div>
  <div class="high-score-info" id="hi-score-display" style="display:none"></div>
  <div class="mode-btns">
    <button class="mode-btn" id="btn-1p">SOLO 🚀</button>
    <button class="mode-btn online" id="btn-host">HOST CO-OP 🌐</button>
    <button class="mode-btn online" id="btn-join-online">JOIN CO-OP 🌐</button>
  </div>
  <div id="online-panel" style="display:none; text-align:center; margin:10px 0 6px;">
    <div id="online-status" style="color:#888; font-size:12px; margin-bottom:8px; letter-spacing:1px;"></div>
    <div id="host-id-display" style="display:none; font-size:28px; color:#44ffaa; letter-spacing:8px; font-weight:bold; text-shadow:0 0 16px #44ffaa88;"></div>
    <div id="join-input-row" style="display:none;">
      <input id="peer-id-input" placeholder="ENTER CODE" maxlength="30" style="background:#000; border:2px solid #44aaff; color:#44ffaa; padding:8px 14px; font-family:'Courier New',monospace; font-size:18px; letter-spacing:4px; border-radius:4px; text-align:center; width:190px; pointer-events:all; text-transform:uppercase;"/>
      <button id="btn-join-connect" style="background:#44aaff22; border:2px solid #44aaff; color:#44aaff; padding:8px 16px; font-size:14px; cursor:pointer; border-radius:4px; font-family:'Courier New',monospace; margin-left:8px; pointer-events:all; letter-spacing:1px;">GO</button>
    </div>
  </div>
  <p style="font-size:11px; color:#444; margin-top:4px;">
    W·A·S·D to move &nbsp;|&nbsp; Mobile: tap quadrants
  </p>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const muteBtn = document.getElementById('mute-btn');

let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const AC = new (window.AudioContext || window.webkitAudioContext)();
let muted = false;
muteBtn.onclick = () => { muted = !muted; muteBtn.textContent = muted ? '🔇 UNMUTE' : '🔊 MUTE'; };

let musicNodes = [], musicPlaying = false, musicTempo = 0.17;

// Simple shared output for music (gentle headroom so square waves don't clip harshly)
const musicGain = AC.createGain();
musicGain.gain.value = 0.5;
musicGain.connect(AC.destination);

// Note name → frequency (equal temperament, A4 = 440)
const SCALE = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
function ntof(n) {
  return 440 * Math.pow(2, ((+n.slice(-1) + 1) * 12 + SCALE.indexOf(n.slice(0, -1)) - 69) / 12);
}

// One pure square-wave note
function mnote(freq, start, dur, vol) {
  if (muted) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = 'square'; o.frequency.value = freq;
  o.connect(g); g.connect(musicGain);
  const tt = AC.currentTime + start;
  g.gain.setValueAtTime(0, tt);
  g.gain.linearRampToValueAtTime(vol, tt + 0.008);
  g.gain.setValueAtTime(vol, tt + dur - 0.02);
  g.gain.linearRampToValueAtTime(0, tt + dur);
  o.start(tt); o.stop(tt + dur + 0.02);
  musicNodes.push(o);
}

// Drums: square kick + noise snare/hat
function mdrum(start, type) {
  if (muted) return;
  const tt = AC.currentTime + start;
  if (type === 'kick') {
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = 'square';
    o.frequency.setValueAtTime(150, tt);
    o.frequency.exponentialRampToValueAtTime(50, tt + 0.07);
    g.gain.setValueAtTime(0.45, tt);
    g.gain.exponentialRampToValueAtTime(0.001, tt + 0.12);
    o.connect(g); g.connect(musicGain);
    o.start(tt); o.stop(tt + 0.13);
    musicNodes.push(o);
  } else {
    const dur = type === 'snare' ? 0.09 : 0.03;
    const len = Math.floor(AC.sampleRate * dur);
    const buf = AC.createBuffer(1, len, AC.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    const src = AC.createBufferSource(); src.buffer = buf;
    const g = AC.createGain();
    g.gain.setValueAtTime(type === 'snare' ? 0.22 : 0.07, tt);
    g.gain.exponentialRampToValueAtTime(0.001, tt + dur);
    src.connect(g); g.connect(musicGain);
    src.start(tt); src.stop(tt + dur + 0.01);
    musicNodes.push(src);
  }
}

// Gradius-style 32 eighth-note loop — A major, twin square-wave leads.
function playMusic() {
  stopMusic(); musicPlaying = true;
  const s = musicTempo;

  const mel = [
    'A4','E5','A5','E5', 'F#5','E5','D5','C#5',
    'B4','C#5','D5','E5', 'A5',null,'G#5','E5',
    'D5','E5','F#5','A5', 'G#5','F#5','E5','D5',
    'C#5','E5','A5','B5', 'A5',null,null,null
  ];
  const har = [
    'F#4','C#5','F#5','C#5', 'D5','C#5','B4','A4',
    'G#4','A4','B4','C#5', 'F#5',null,'E5','C#5',
    'B4','C#5','D5','F#5', 'E5','D5','C#5','B4',
    'A4','C#5','F#5','G#5', 'F#5',null,null,null
  ];
  const bass = ['A1','A2','A1','A2', 'E1','E2','E1','E2', 'D1','D2','D1','D2', 'E1','E2','A1','A2'];

  mel.forEach((n,i) => { if(n) mnote(ntof(n), i*s, s*0.85, 0.22); });
  har.forEach((n,i) => { if(n) mnote(ntof(n), i*s, s*0.85, 0.10); });
  bass.forEach((n,i) => mnote(ntof(n), i*2*s, s*2*0.95, 0.18));

  for(let i=0;i<32;i++){
    if(i%4===0) mdrum(i*s,'kick');
    if(i%4===2) mdrum(i*s,'snare');
    mdrum(i*s,'hat');
  }

  const loopTime = 32*s*1000;
  if(musicPlaying) setTimeout(()=>{ if(musicPlaying) playMusic(); }, loopTime);
}

function stopMusic() {
  musicPlaying = false;
  musicNodes.forEach(n => { try { n.stop(); } catch(e){} });
  musicNodes = [];
}

function sfx(type) {
  if (muted) return;
  if (type === 'hit') {
    const o = AC.createOscillator(), g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.frequency.setValueAtTime(200, AC.currentTime);
    o.frequency.linearRampToValueAtTime(50, AC.currentTime+0.3);
    g.gain.setValueAtTime(0.4, AC.currentTime);
    g.gain.linearRampToValueAtTime(0, AC.currentTime+0.3);
    o.start(); o.stop(AC.currentTime+0.3);
  }
  if (type === 'shoot') {
    const o = AC.createOscillator(), g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.frequency.setValueAtTime(600, AC.currentTime);
    o.frequency.linearRampToValueAtTime(180, AC.currentTime+0.12);
    g.gain.setValueAtTime(0.15, AC.currentTime);
    g.gain.linearRampToValueAtTime(0, AC.currentTime+0.12);
    o.start(); o.stop(AC.currentTime+0.12);
  }
  if (type === 'gameover') {
    [200,150,100].forEach((f,i) => {
      const o = AC.createOscillator(), g = AC.createGain();
      o.connect(g); g.connect(AC.destination);
      o.frequency.value = f;
      g.gain.setValueAtTime(0.3, AC.currentTime+i*0.3);
      g.gain.linearRampToValueAtTime(0, AC.currentTime+i*0.3+0.25);
      o.start(AC.currentTime+i*0.3); o.stop(AC.currentTime+i*0.3+0.25);
    });
  }
  if (type === 'shield-collect') {
    [523,659,784,1047].forEach((f,i) => {
      const o = AC.createOscillator(), g = AC.createGain();
      o.connect(g); g.connect(AC.destination);
      o.type = 'sine'; o.frequency.value = f;
      g.gain.setValueAtTime(0, AC.currentTime+i*0.09);
      g.gain.linearRampToValueAtTime(0.22, AC.currentTime+i*0.09+0.02);
      g.gain.linearRampToValueAtTime(0, AC.currentTime+i*0.09+0.28);
      o.start(AC.currentTime+i*0.09); o.stop(AC.currentTime+i*0.09+0.3);
    });
  }
  if (type === 'shield-bounce') {
    const o = AC.createOscillator(), g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type = 'triangle';
    o.frequency.setValueAtTime(1200, AC.currentTime);
    o.frequency.exponentialRampToValueAtTime(600, AC.currentTime+0.15);
    g.gain.setValueAtTime(0.28, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+0.42);
    o.start(); o.stop(AC.currentTime+0.45);
  }
  if (type === 'extra-life') {
    // Triumphant ascending arpeggio
    [523,659,784,1047,1319].forEach((f,i) => {
      const o = AC.createOscillator(), g = AC.createGain();
      o.connect(g); g.connect(AC.destination);
      o.type = 'triangle'; o.frequency.value = f;
      const s = i*0.08;
      g.gain.setValueAtTime(0, AC.currentTime+s);
      g.gain.linearRampToValueAtTime(0.25, AC.currentTime+s+0.02);
      g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+s+0.35);
      o.start(AC.currentTime+s); o.stop(AC.currentTime+s+0.36);
    });
    // Final sparkle
    const o2 = AC.createOscillator(), g2 = AC.createGain();
    o2.connect(g2); g2.connect(AC.destination);
    o2.type = 'sine';
    o2.frequency.setValueAtTime(1568, AC.currentTime+0.4);
    o2.frequency.linearRampToValueAtTime(2093, AC.currentTime+0.55);
    g2.gain.setValueAtTime(0.18, AC.currentTime+0.4);
    g2.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+0.72);
    o2.start(AC.currentTime+0.4); o2.stop(AC.currentTime+0.74);
  }
}

const P1_COLORS = {
  body: '#2244aa', hull: '#88ccff', cockpit: '#aaeeff',
  wing: '#4466aa', glow: '#4488ff', flame: '#4499ff', trail: '#2255aa'
};
const P2_COLORS = {
  body: '#881100', hull: '#ff6622', cockpit: '#ffcc88',
  wing: '#993322', glow: '#ff4400', flame: '#ff8800', trail: '#882200'
};

// 3-layer parallax stars
const starLayers = [
  Array.from({length:90},  () => ({x:Math.random()*1920, y:Math.random()*1080, s:Math.random()*0.6+0.2, sp:0.1+Math.random()*0.1,  b:0.25+Math.random()*0.25})),
  Array.from({length:55},  () => ({x:Math.random()*1920, y:Math.random()*1080, s:Math.random()*1.0+0.4, sp:0.45+Math.random()*0.25, b:0.45+Math.random()*0.35})),
  Array.from({length:25},  () => ({x:Math.random()*1920, y:Math.random()*1080, s:Math.random()*1.6+0.7, sp:1.0+Math.random()*0.5,  b:0.65+Math.random()*0.35})),
];
const dustParticles = Array.from({length:70}, () => ({x:Math.random()*1920, y:Math.random()*1080, s:Math.random()*0.7+0.2, sp:0.04+Math.random()*0.09, a:0.06+Math.random()*0.14}));
const planet = {
  x: 1440, y: 160, r: 72, sp: 0.018,
  craters: Array.from({length:5}, () => ({ax:(Math.random()-0.5)*100, ay:(Math.random()-0.5)*80, r:4+Math.random()*10}))
};

let numPlayers = 1;
let players = [];
let asteroids, bullets, particles;
let score = 0, gameActive = false;
let keys = {};
let touchUp=false, touchDown=false, touchLeft=false, touchRight=false;
let highScore = 0;
let asteroidTimer = 0;
let lastTime = 0;
let debugMode = false;
let paused = false;
let cave = null;
let caveTime = 0;
let shieldPowerup = null;
let shieldPowerupCooldown = 30000;

// Online co-op state
let peer = null, conn = null;
let onlineMode = false; // false | 'host' | 'joiner'
let remoteInput = { up: false, down: false, left: false, right: false };
let remoteState = null;
let lastStateSend = 0;

function makePlayer(colors, startY) {
  return { x: 100, y: startY, vx: 0, vy: 0, trail: [], lives: 3, alive: true, invincible: 0, shield: 0, dodges: 0, colors };
}

function initGame() {
  const y1 = numPlayers === 2 ? H/2 - 60 : H/2;
  players = [makePlayer(P1_COLORS, y1)];
  if (numPlayers === 2) players.push(makePlayer(P2_COLORS, H/2 + 60));

  asteroids = []; bullets = []; particles = [];
  score = 0; gameActive = true;
  musicTempo = 0.17;
  asteroidTimer = 0;
  cave = null; caveTime = 0;
  shieldPowerup = null; shieldPowerupCooldown = 30000;
  setPaused(false);
  updateHUD();
  playMusic(false);
}

function setPaused(p) {
  paused = p;
  document.getElementById('pause-msg').style.display = p ? 'block' : 'none';
}

function togglePause() {
  // Pause only makes sense in local (non-online) active play
  if (!gameActive || onlineMode) return;
  setPaused(!paused);
}

function checkGameOver() {
  if (players.every(p => !p.alive)) endGame();
}

// --- Cave ---

function makeCaveSeg(x, segW) {
  return {
    x, phase: Math.random() * Math.PI * 2,
    topJag: 22 + Math.random() * 30,
    botJag: 22 + Math.random() * 30
  };
}

function makeTurret(x) {
  return { x, wall: Math.random() < 0.5 ? 'top' : 'bottom', timer: Math.floor(Math.random() * 100), interval: 110 + Math.floor(Math.random() * 80) };
}

function initCave() {
  const segW = 60;
  const count = Math.ceil(W / segW) + 6;
  const turrets = [];
  for (let i = 0; i < 5; i++) turrets.push(makeTurret(W + 220 + i * 270 + Math.random() * 80));
  cave = {
    gap: H * 0.72, center: H / 2, segW, slideOffset: H,
    hillScrollOffset: 0,
    segs: Array.from({length: count}, (_, i) => makeCaveSeg(i * segW, segW)),
    turrets
  };
}

function updateCave(dt) {
  caveTime += dt * 0.001;
  if (cave.slideOffset > 0) cave.slideOffset = Math.max(0, cave.slideOffset - H * dt / 2000);
  const speed = 2 + score / 400;
  cave.hillScrollOffset = (cave.hillScrollOffset || 0) + speed;
  cave.segs.forEach(s => s.x -= speed);
  while (cave.segs.length && cave.segs[0].x < -cave.segW - 10) cave.segs.shift();
  while (cave.segs[cave.segs.length - 1].x < W + cave.segW)
    cave.segs.push(makeCaveSeg(cave.segs[cave.segs.length - 1].x + cave.segW, cave.segW));
  cave.turrets.forEach(t => t.x -= speed);
  cave.turrets = cave.turrets.filter(t => t.x > -30);
  const lastT = cave.turrets[cave.turrets.length - 1];
  if (!lastT || lastT.x < W + 80) {
    const newX = lastT ? lastT.x + 250 + Math.random() * 100 : W + 220;
    cave.turrets.push(makeTurret(newX));
  }
}

function drawTurret(t) {
  const slideOffset = cave.slideOffset || 0;
  const topEdge = cave.center - cave.gap / 2 - slideOffset;
  const botEdge = cave.center + cave.gap / 2 + slideOffset;
  const isTop = t.wall === 'top';
  const ty = isTop ? topEdge : botEdge;
  const dir = isTop ? 1 : -1;
  ctx.save(); ctx.translate(t.x, ty);
  ctx.shadowBlur = 12; ctx.shadowColor = '#ff4422';
  ctx.fillStyle = '#aa2200';
  ctx.beginPath();
  ctx.moveTo(0, dir * 16); ctx.lineTo(-9, dir * -2);
  ctx.lineTo(-5, dir * -10); ctx.lineTo(5, dir * -10); ctx.lineTo(9, dir * -2);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#ff5533';
  ctx.beginPath(); ctx.moveTo(0, dir * 10); ctx.lineTo(-4, dir * 0); ctx.lineTo(4, dir * 0); ctx.closePath(); ctx.fill();
  ctx.shadowBlur = 8; ctx.shadowColor = '#ffaa44';
  ctx.fillStyle = '#ffaa44';
  ctx.beginPath(); ctx.arc(0, dir * 16, 2.5, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0; ctx.restore();
}

function hillH(x) {
  if (!cave) return 0;
  const wx = x + (cave.hillScrollOffset || 0);
  const s = Math.sin(wx/220)*0.45 + Math.sin(wx/115+2.3)*0.30 + Math.sin(wx/68+5.1)*0.15;
  return 35 * Math.max(0.1, 0.5 + s * 0.55);
}

function drawCaveWalls() {
  if (!cave) return;
  const slideOffset = cave.slideOffset || 0;
  const topEdge = cave.center - cave.gap / 2 - slideOffset;
  const botEdge = cave.center + cave.gap / 2 + slideOffset;
  ctx.save();

  // TOP WALL — flat green grassy ground
  const topGrad = ctx.createLinearGradient(0, 0, 0, topEdge);
  topGrad.addColorStop(0, '#091504');
  topGrad.addColorStop(0.7, '#142e08');
  topGrad.addColorStop(1, '#2d7014');

  ctx.fillStyle = topGrad;
  ctx.fillRect(-4, -4, W + 8, topEdge + 4);

  // Flat grass stripe at the bottom edge
  ctx.shadowBlur = 10; ctx.shadowColor = '#70e030';
  ctx.strokeStyle = '#50be18'; ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(-4, topEdge); ctx.lineTo(W + 4, topEdge);
  ctx.stroke();

  // Bright tip highlight just above
  ctx.shadowBlur = 5; ctx.shadowColor = '#b8ff80';
  ctx.strokeStyle = '#7ee030'; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-4, topEdge - 4); ctx.lineTo(W + 4, topEdge - 4);
  ctx.stroke();

  // BOTTOM WALL — grassy hills rising up from botEdge
  const botGrad = ctx.createLinearGradient(0, H, 0, botEdge - 45);
  botGrad.addColorStop(0, '#091504');
  botGrad.addColorStop(0.58, '#142e08');
  botGrad.addColorStop(0.86, '#215710');
  botGrad.addColorStop(1, '#2d7014');

  ctx.beginPath();
  ctx.moveTo(-4, H + 4);
  ctx.lineTo(W + 4, H + 4);
  for (let x = W + 4; x >= -4; x -= 4) ctx.lineTo(x, botEdge - hillH(x));
  ctx.closePath();
  ctx.fillStyle = botGrad;
  ctx.fill();

  // Grass edge on bottom
  ctx.shadowBlur = 10; ctx.shadowColor = '#70e030';
  ctx.strokeStyle = '#50be18'; ctx.lineWidth = 3.5;
  ctx.beginPath();
  ctx.moveTo(-4, botEdge - hillH(-4));
  for (let x = 0; x <= W + 4; x += 4) ctx.lineTo(x, botEdge - hillH(x));
  ctx.stroke();

  ctx.shadowBlur = 5; ctx.shadowColor = '#b8ff80';
  ctx.strokeStyle = '#7ee030'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-4, botEdge - hillH(-4) + 4);
  for (let x = 0; x <= W + 4; x += 4) ctx.lineTo(x, botEdge - hillH(x) + 4);
  ctx.stroke();

  ctx.shadowBlur = 0;
  cave.turrets.forEach(t => drawTurret(t));
  ctx.restore();
}

// --- Draw helpers ---

function spawnExplosion(x, y, color='#ff8844') {
  // Flash
  for (let i=0;i<8;i++) { const a=Math.random()*Math.PI*2,sp=4+Math.random()*6;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:0.09,color:'#ffffff',size:3+Math.random()*3}); }
  // Fireball
  for (let i=0;i<22;i++) { const a=Math.random()*Math.PI*2,sp=1+Math.random()*4.5;
    const fc=['#ff8800','#ff4400','#ffcc00','#ff6600','#ffaa00'][Math.floor(Math.random()*5)];
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:0.02,color:fc,size:5+Math.random()*9}); }
  // Debris chunks
  for (let i=0;i<12;i++) { const a=Math.random()*Math.PI*2,sp=0.5+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp+0.4,life:1,decay:0.014,color:'#776655',size:2+Math.random()*4}); }
  // Smoke
  for (let i=0;i<6;i++) { const a=Math.random()*Math.PI*2,sp=0.3+Math.random()*1.2;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-0.6,life:0.65,decay:0.007,color:'#2a1a14',size:10+Math.random()*16}); }
}

function drawShip(p, alpha=1) {
  const c = p.colors;
  const spd = Math.hypot(p.vx, p.vy);
  const pulse = 0.55 + 0.45*Math.sin(Date.now()*0.011);
  ctx.save(); ctx.globalAlpha = alpha; ctx.translate(p.x, p.y);

  // Engine nacelles
  ctx.shadowBlur = 0; ctx.fillStyle = c.wing;
  ctx.beginPath(); ctx.ellipse(-7,-12,11,3.5,0.12,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-7,12,11,3.5,-0.12,0,Math.PI*2); ctx.fill();

  // Main hull
  ctx.shadowBlur = 10; ctx.shadowColor = c.glow; ctx.fillStyle = c.hull;
  ctx.beginPath(); ctx.moveTo(24,0); ctx.lineTo(9,-9); ctx.lineTo(-16,-8); ctx.lineTo(-21,0); ctx.lineTo(-16,8); ctx.lineTo(9,9); ctx.closePath(); ctx.fill();

  // Hull panel lines
  ctx.shadowBlur=0; ctx.strokeStyle=c.body; ctx.lineWidth=1; ctx.globalAlpha=alpha*0.55;
  ctx.beginPath(); ctx.moveTo(7,-7); ctx.lineTo(-9,-7); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(7,7); ctx.lineTo(-9,7); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-2,-7); ctx.lineTo(-2,7); ctx.stroke();
  ctx.globalAlpha=alpha;

  // Cockpit canopy
  ctx.shadowBlur=8; ctx.shadowColor='#88eeff'; ctx.fillStyle=c.cockpit;
  ctx.beginPath(); ctx.ellipse(10,-2,7,4,-0.25,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(200,245,255,0.28)';
  ctx.beginPath(); ctx.ellipse(11,-3,3.5,2,-0.3,0,Math.PI*2); ctx.fill();

  // Engine glow rings
  const eg = Math.min(1,spd*0.3+0.45)*pulse;
  ctx.shadowBlur=14*eg; ctx.shadowColor=c.flame; ctx.strokeStyle=c.flame; ctx.lineWidth=1.8; ctx.globalAlpha=alpha*eg;
  ctx.beginPath(); ctx.ellipse(-18,-12,3.5,2.5,0,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(-18,12,3.5,2.5,0,0,Math.PI*2); ctx.stroke();
  ctx.globalAlpha=alpha;

  // Thruster flames (top + bottom nacelle)
  const fl = 9+spd*3.5+Math.random()*5;
  ctx.shadowBlur=8; ctx.shadowColor=c.flame;
  [[-12],[12]].forEach(([ny]) => {
    const fg=ctx.createLinearGradient(-18,ny,-18-fl,ny);
    fg.addColorStop(0,'#ffffff'); fg.addColorStop(0.22,c.flame); fg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=fg; ctx.beginPath(); ctx.moveTo(-18,ny-3); ctx.lineTo(-18-fl,ny); ctx.lineTo(-18,ny+3); ctx.closePath(); ctx.fill();
  });

  ctx.shadowBlur=0; ctx.restore();
}

function drawAsteroid(a) {
  ctx.save(); ctx.translate(a.x, a.y); ctx.rotate(a.rot);
  ctx.beginPath(); ctx.moveTo(a.pts[0].dx, a.pts[0].dy);
  for (let i=1; i<a.pts.length; i++) ctx.lineTo(a.pts[i].dx, a.pts[i].dy);
  ctx.closePath();
  const grad = ctx.createRadialGradient(-a.size*0.2,-a.size*0.2,a.size*0.05,0,0,a.size);
  grad.addColorStop(0,'#7a7060'); grad.addColorStop(0.45,'#4a4030'); grad.addColorStop(1,'#252015');
  ctx.fillStyle = grad; ctx.fill();
  ctx.strokeStyle = '#5a5040'; ctx.lineWidth = 1.5; ctx.stroke();
  // Shadow side
  const shad = ctx.createRadialGradient(a.size*0.3,a.size*0.3,0,a.size*0.3,a.size*0.3,a.size*1.1);
  shad.addColorStop(0,'rgba(0,0,0,0)'); shad.addColorStop(0.6,'rgba(0,0,0,0.22)'); shad.addColorStop(1,'rgba(0,0,0,0.52)');
  ctx.fillStyle=shad; ctx.beginPath(); ctx.moveTo(a.pts[0].dx, a.pts[0].dy);
  for (let i=1; i<a.pts.length; i++) ctx.lineTo(a.pts[i].dx, a.pts[i].dy);
  ctx.closePath(); ctx.fill();
  // Highlight
  ctx.fillStyle='rgba(255,245,230,0.08)';
  ctx.beginPath(); ctx.ellipse(-a.size*0.22,-a.size*0.22,a.size*0.28,a.size*0.18,-0.5,0,Math.PI*2); ctx.fill();
  // Surface cracks
  ctx.strokeStyle='#1a1510'; ctx.lineWidth=1;
  a.cracks.forEach(cr => { ctx.beginPath(); ctx.moveTo(cr.ax,cr.ay); ctx.lineTo(cr.bx,cr.by); ctx.stroke(); });
  // Craters
  if (a.craters) a.craters.forEach(cr => {
    ctx.beginPath(); ctx.arc(cr.cx,cr.cy,cr.r,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fill();
    ctx.strokeStyle='rgba(150,140,120,0.35)'; ctx.lineWidth=0.8; ctx.stroke();
  });
  ctx.restore();
}


function drawBullet(bl) {
  if (debugMode) {
    // no save/restore, no transforms — draw everything flat in screen space
    if (bl.trail && bl.trail.length > 1) {
      ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 2; ctx.shadowBlur = 0;
      ctx.beginPath(); ctx.moveTo(bl.trail[0].x, bl.trail[0].y);
      bl.trail.forEach(p => ctx.lineTo(p.x, p.y));
      ctx.stroke();
    }
    // circle drawn at exactly bl.x, bl.y — same coords as trail endpoint
    ctx.fillStyle = '#ff0000'; ctx.shadowBlur = 0;
    ctx.beginPath(); ctx.arc(bl.x, bl.y, 10, 0, Math.PI*2); ctx.fill();
    return;
  }
  ctx.save(); ctx.shadowBlur = 8; ctx.shadowColor = '#ffff44';
  ctx.fillStyle = '#ffff44'; ctx.beginPath(); ctx.arc(bl.x,bl.y,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(bl.x,bl.y,2,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0; ctx.restore();
}

function drawShieldPowerup(pu) {
  const t = Date.now() * 0.003;
  const pulse = 0.7 + 0.3 * Math.sin(t);
  ctx.save(); ctx.translate(pu.x, pu.y);
  const grd = ctx.createRadialGradient(0,0,0,0,0,28);
  grd.addColorStop(0, `rgba(100,200,255,${0.45*pulse})`);
  grd.addColorStop(0.55, `rgba(60,160,255,${0.2*pulse})`);
  grd.addColorStop(1, 'rgba(0,100,255,0)');
  ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(0,0,28,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur = 22*pulse; ctx.shadowColor = '#44aaff';
  ctx.strokeStyle = `rgba(130,210,255,${pulse})`; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.arc(0,0,16,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle = `rgba(120,210,255,${0.15*pulse})`; ctx.fill();
  ctx.shadowBlur = 8*pulse; ctx.shadowColor = '#aaeeff';
  ctx.fillStyle = `rgba(200,240,255,${pulse})`;
  ctx.beginPath(); ctx.moveTo(0,8); ctx.lineTo(-6,3); ctx.lineTo(-6,-2);
  ctx.bezierCurveTo(-6,-7,6,-7,6,-2); ctx.lineTo(6,3); ctx.closePath(); ctx.fill();
  ctx.shadowBlur = 0; ctx.restore();
}

function drawShieldEffect(p) {
  const t = Date.now() * 0.004;
  const pulse = 0.65 + 0.35 * Math.sin(t);
  const frac = Math.min(1, p.shield / 60000);
  ctx.save(); ctx.translate(p.x, p.y);
  ctx.shadowBlur = 20*pulse; ctx.shadowColor = '#44aaff';
  ctx.strokeStyle = `rgba(100,180,255,${0.8*pulse})`; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.arc(0,0,30,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle = `rgba(80,160,255,${0.07*pulse})`; ctx.fill();
  ctx.shadowBlur = 0;
  ctx.rotate(t * 0.6);
  ctx.strokeStyle = `rgba(120,210,255,${0.3*pulse})`; ctx.lineWidth = 1.2;
  ctx.setLineDash([5,9]); ctx.beginPath(); ctx.arc(0,0,27,0,Math.PI*2); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();
  const barW = 44, barH = 4, bx = p.x - barW/2, by = p.y + 34;
  const isLow = p.shield < 6000;
  ctx.fillStyle = '#0a0a22'; ctx.fillRect(bx-1, by-1, barW+2, barH+2);
  ctx.fillStyle = isLow ? `rgba(255,60,60,${0.85+0.15*pulse})` : `rgba(68,170,255,${0.85+0.15*pulse})`;
  ctx.fillRect(bx, by, barW*frac, barH);
  ctx.strokeStyle = isLow ? '#ff6666' : '#66ccff'; ctx.lineWidth = 1; ctx.strokeRect(bx, by, barW, barH);
}

function spawnShieldBounce(px, py) {
  for (let i = 0; i < 10; i++) {
    const a = Math.random()*Math.PI*2, sp = 1.5+Math.random()*3;
    particles.push({ x:px, y:py, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
      life:1, decay:0.04,
      color:['#44aaff','#88ddff','#aaeeff','#ffffff','#4466ff'][Math.floor(Math.random()*5)],
      size:2+Math.random()*4 });
  }
}

function spawnAsteroid() {
  const size = 20 + Math.random()*30;
  const speed = (1.5 + score/200) * (0.7 + Math.random()*0.6);
  const numPoints = 10 + Math.floor(Math.random()*6);
  const pts = [];
  for (let i=0; i<numPoints; i++) {
    const angle = (i/numPoints)*Math.PI*2 + (Math.random()-0.5)*(Math.PI/numPoints)*0.8;
    const r = size * (0.5 + Math.random()*0.65);
    pts.push({ dx: Math.cos(angle)*r, dy: Math.sin(angle)*r });
  }
  asteroids.push({
    x: W + size,
    y: cave ? (cave.center - cave.gap/2 + size + Math.random() * Math.max(1, cave.gap - size*2)) : 60 + Math.random()*(H-120),
    vx: -speed, vy: (Math.random()-0.5)*1.5,
    size, pts, rot: Math.random()*Math.PI*2, rotSpeed: (Math.random()-0.5)*0.04,
    cracks: Array.from({length:3}, () => ({
      ax: (Math.random()-0.5)*size*0.5, ay: (Math.random()-0.5)*size*0.5,
      bx: (Math.random()-0.5)*size*0.8, by: (Math.random()-0.5)*size*0.8
    })),
    craters: Array.from({length:2+Math.floor(Math.random()*2)}, () => ({
      cx: (Math.random()-0.5)*size*0.7, cy: (Math.random()-0.5)*size*0.7, r: 2+Math.random()*size*0.12
    }))
  });
}


function heartStr(n, emoji) {
  n = Math.max(0, n);
  return n > 0 ? Array(n).fill(emoji).join(' ') : '';
}

function updateHUD() {
  document.getElementById('p1-lives').textContent = players[0] ? heartStr(players[0].lives, '❤️') : '';
  if (numPlayers === 2 && players[1] && onlineMode !== 'host') {
    document.getElementById('p2-lives').textContent = heartStr(players[1].lives, '🧡');
  }
}

function showExtraLifeMsg() {
  const el = document.getElementById('extra-life-msg');
  el.style.display = 'block';
  el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
  clearTimeout(showExtraLifeMsg._t);
  showExtraLifeMsg._t = setTimeout(() => { el.style.display = 'none'; }, 1600);
}

function awardExtraLife(p) {
  p.lives++; p.dodges = 0;
  updateHUD();
  sfx('extra-life');
  showExtraLifeMsg();
  if (onlineMode === 'host' && conn && conn.open) {
    try { conn.send({ type: 'extralife' }); } catch(e){}
  }
}

function endGame() {
  gameActive = false; setPaused(false); stopMusic(); sfx('gameover');
  if (score > highScore) highScore = score;
  document.getElementById('last-score').style.display = 'block';
  document.getElementById('last-score').textContent = 'SCORE: ' + Math.floor(score);
  document.getElementById('hi-score-display').style.display = 'block';
  document.getElementById('hi-score-display').textContent = '🏆 BEST: ' + Math.floor(highScore);
  overlay.style.display = 'flex';
}

function gameLoop(ts) {
  requestAnimationFrame(gameLoop);
  try {
  // Paused: keep the last rendered frame frozen on canvas, skip all updates & drawing
  if (paused) { lastTime = ts; return; }
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;

  ctx.fillStyle = '#000008'; ctx.fillRect(0,0,W,H);

  // Nebula clouds
  [[W*0.18,H*0.32,W*0.28,H*0.22,'75,30,120',0.055],[W*0.62,H*0.58,W*0.34,H*0.26,'15,50,130',0.05],[W*0.42,H*0.82,W*0.22,H*0.2,'55,15,95',0.04]].forEach(([nx,ny,rx,ry,col,a]) => {
    ctx.save(); ctx.translate(nx,ny); ctx.scale(rx/110,ry/110);
    const ng=ctx.createRadialGradient(0,0,0,0,0,110); ng.addColorStop(0,`rgba(${col},${a})`); ng.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=ng; ctx.beginPath(); ctx.arc(0,0,110,0,Math.PI*2); ctx.fill(); ctx.restore();
  });

  // Distant planet
  { const psp = 1+score/500; planet.x -= planet.sp*psp; if (!isFinite(planet.x) || planet.x < -planet.r*3) planet.x = W+planet.r*2;
    const px=planet.x, py=planet.y, pr=planet.r;
    const pg=ctx.createRadialGradient(px-pr*0.35,py-pr*0.35,pr*0.05,px,py,pr);
    pg.addColorStop(0,'#9aacdc'); pg.addColorStop(0.4,'#4a5f8a'); pg.addColorStop(1,'#0c0c24');
    ctx.beginPath(); ctx.arc(px,py,pr,0,Math.PI*2); ctx.fillStyle=pg; ctx.fill();
    const ag=ctx.createRadialGradient(px,py,pr*0.82,px,py,pr*1.1);
    ag.addColorStop(0,'rgba(80,100,255,0)'); ag.addColorStop(0.6,'rgba(80,100,200,0.12)'); ag.addColorStop(1,'rgba(80,100,200,0)');
    ctx.beginPath(); ctx.arc(px,py,pr*1.1,0,Math.PI*2); ctx.fillStyle=ag; ctx.fill();
    ctx.save(); ctx.translate(px,py); ctx.scale(1,0.22);
    ctx.strokeStyle='rgba(165,180,225,0.28)'; ctx.lineWidth=pr*0.32/0.22;
    ctx.beginPath(); ctx.arc(0,0,pr*1.58,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle='rgba(140,155,205,0.14)'; ctx.lineWidth=pr*0.16/0.22;
    ctx.beginPath(); ctx.arc(0,0,pr*1.85,0,Math.PI*2); ctx.stroke();
    ctx.restore();
    planet.craters.forEach(cr => {
      ctx.beginPath(); ctx.arc(px+cr.ax,py+cr.ay,cr.r,0,Math.PI*2);
      ctx.fillStyle='rgba(0,0,20,0.28)'; ctx.fill();
      ctx.strokeStyle='rgba(150,170,220,0.15)'; ctx.lineWidth=1; ctx.stroke();
    });
  }

  // 3-layer parallax stars + space dust
  const spMul = 1+score/500;
  starLayers.forEach(layer => layer.forEach(s => {
    s.x -= s.sp*spMul; if (s.x < 0) { s.x = W+2; s.y = Math.random()*H; }
    ctx.fillStyle=`rgba(255,255,255,${s.b})`; ctx.beginPath(); ctx.arc(s.x,s.y,s.s,0,Math.PI*2); ctx.fill();
  }));
  dustParticles.forEach(d => {
    d.x -= d.sp*spMul; if (d.x < 0) { d.x = W+2; d.y = Math.random()*H; }
    ctx.fillStyle=`rgba(200,210,255,${d.a})`; ctx.beginPath(); ctx.arc(d.x,d.y,d.s,0,Math.PI*2); ctx.fill();
  });

  if (onlineMode === 'joiner') { renderJoinerFrame(dt, ts); return; }
  if (!gameActive) { return; }

  // --- Player input & movement ---
  const p1 = players[0];
  if (p1.alive) {
    if (keys['w'] || keys['W'] || touchUp)    p1.vy -= 0.5;
    if (keys['s'] || keys['S'] || touchDown)  p1.vy += 0.5;
    if (keys['a'] || keys['A'] || touchLeft)  p1.vx -= 0.5;
    if (keys['d'] || keys['D'] || touchRight) p1.vx += 0.5;
  }
  if (numPlayers === 2 && players[1] && players[1].alive) {
    const p2 = players[1];
    if (onlineMode === 'host') {
      if (remoteInput.up)    p2.vy -= 0.5;
      if (remoteInput.down)  p2.vy += 0.5;
      if (remoteInput.left)  p2.vx -= 0.5;
      if (remoteInput.right) p2.vx += 0.5;
    } else {
      if (keys['ArrowUp'])    p2.vy -= 0.5;
      if (keys['ArrowDown'])  p2.vy += 0.5;
      if (keys['ArrowLeft'])  p2.vx -= 0.5;
      if (keys['ArrowRight']) p2.vx += 0.5;
    }
  }

  // Cave update (once, shared)
  if (cave) {
    updateCave(dt);
    const slideOffset = cave.slideOffset || 0;
    const topEdge = cave.center - cave.gap / 2 - slideOffset;
    const botEdge = cave.center + cave.gap / 2 + slideOffset;
    // Turret shooting — screen space: vx: 0 keeps bullet at fixed x on screen, only vy moves it
    cave.turrets.forEach(t => {
      t.y = t.wall === 'top' ? topEdge : botEdge;
      t.timer++;
      if (t.timer >= t.interval && t.x > 0 && t.x < W && slideOffset <= 0) {
        t.timer = 0; sfx('shoot');
        bullets.push({ x: t.x, y: t.y, vx: -3, vy: t.wall === 'top' ? 4 : -4 });
      }
    });

    // Wall collision per player
    players.forEach(p => {
      if (!p.alive || p.invincible > 0 || p.shield > 0) return;
      if (p.y - 14 < topEdge || p.y + 14 > botEdge) {
        sfx('hit');
        spawnExplosion(p.x, p.y < cave.center ? topEdge : botEdge, '#887766');
        p.lives--; p.invincible = 120; updateHUD();
        if (p.lives <= 0) { p.alive = false; checkGameOver(); }
      }
    });
  }

  // Move, clamp, draw each player (host skips drawing P2 — joiner sees P2 only)
  players.forEach((p, idx) => {
    if (!p.alive) return;
    p.vx *= 0.85; p.vy *= 0.85;
    p.x += p.vx; p.y += p.vy;
    p.x = Math.max(20, Math.min(W*0.6, p.x));
    p.y = Math.max(30, Math.min(H-30, p.y));

    p.trail.unshift({x: p.x, y: p.y});
    if (p.trail.length > 8) p.trail.pop();

    const skipDraw = onlineMode === 'host' && idx === 1;
    if (!skipDraw) {
      p.trail.forEach((pt, i) => {
        ctx.globalAlpha = (1 - i/8) * 0.3;
        ctx.fillStyle = p.colors.trail;
        ctx.beginPath(); ctx.arc(pt.x - i*4, pt.y, 4 - i*0.4, 0, Math.PI*2); ctx.fill();
      });
      ctx.globalAlpha = 1;
      const alpha = p.invincible > 0 ? (Math.sin(p.invincible*0.5) > 0 ? 0.4 : 1) : 1;
      drawShip(p, alpha);
      if (p.shield > 0) drawShieldEffect(p);
    }
    if (p.invincible > 0) p.invincible--;
    if (p.shield > 0) p.shield = Math.max(0, p.shield - dt);
  });

  score += dt * 0.01;
  musicTempo = Math.max(0.13, 0.17 - score * 0.0002);

  // Asteroid spawning
  asteroidTimer += dt;
  const maxAsteroids = cave ? 5 : Math.min(8, 3 + Math.floor(score / 50));
  const spawnInterval = Math.max(cave ? 800 : 500, (cave ? 1400 : 1100) - score * 3);
  if (asteroidTimer > spawnInterval) {
    asteroidTimer = 0;
    if (asteroids.length < maxAsteroids) {
      const count = score > 150 && Math.random() < 0.3 ? 2 : 1;
      for (let i = 0; i < count && asteroids.length < maxAsteroids; i++) spawnAsteroid();
    }
  }

  // Asteroids — move, draw, collide with all players
  asteroids = asteroids.filter(a => {
    a.x += a.vx; a.y += a.vy; a.rot += a.rotSpeed;
    if (a.x < -100 || a.x > W + 200) return false;
    drawAsteroid(a);
    for (const p of players) {
      if (!p.alive) continue;
      if (Math.hypot(a.x - p.x, a.y - p.y) < a.size*0.75+14) {
        if (p.shield > 0) {
          sfx('shield-bounce'); spawnShieldBounce(p.x, p.y);
          p.shield = Math.max(0, p.shield - 8000);
          a.vx = Math.abs(a.vx) * 0.9 + 0.5; a.vy += (a.y - p.y) * 0.08;
          a.counted = true;
          break;
        }
        if (p.invincible > 0) continue;
        sfx('hit'); spawnExplosion(a.x, a.y);
        p.lives--; p.invincible = 120; updateHUD();
        if (p.lives <= 0) { p.alive = false; checkGameOver(); }
        return false;
      }
    }
    // Dodge tracking — asteroid slipped past the player without hitting
    for (const p of players) {
      if (p.alive && !a.counted && a.x < p.x) {
        a.counted = true;
        if (Math.abs(a.y - p.y) < a.size*0.75 + 55) {
          p.dodges++;
          if (p.dodges >= 18) awardExtraLife(p);
        }
      }
    }
    return true;
  });

  // Shield power-up
  shieldPowerupCooldown -= dt;
  if (shieldPowerupCooldown <= 0 && !shieldPowerup) {
    shieldPowerup = { x: W + 20, y: H * 0.15 + Math.random() * H * 0.7 };
    shieldPowerupCooldown = 30000;
  }
  if (shieldPowerup) {
    shieldPowerup.x -= 1.8;
    if (shieldPowerup.x < -30) {
      shieldPowerup = null;
    } else {
      drawShieldPowerup(shieldPowerup);
      for (const p of players) {
        if (!p.alive) continue;
        if (Math.hypot(shieldPowerup.x - p.x, shieldPowerup.y - p.y) < 28) {
          p.shield = 60000; sfx('shield-collect'); shieldPowerup = null; break;
        }
      }
    }
  }

  if (!cave && score > 256) initCave();

  if (cave) drawCaveWalls();

  // Bullets — move, draw, collide with all players
  bullets = bullets.filter(bl => {
    bl.x += bl.vx; bl.y += bl.vy;
    if (bl.x<-10||bl.x>W+10||bl.y<-10||bl.y>H+10) return false;
    if (debugMode) {
      if (!bl.trail) bl.trail = [];
      bl.trail.push({ x: bl.x, y: bl.y });
      const trailEnd = bl.trail[bl.trail.length - 1];
      const tf = ctx.getTransform();
      console.log(`trail_end:(${trailEnd.x.toFixed(1)},${trailEnd.y.toFixed(1)}) circle:(${bl.x.toFixed(1)},${bl.y.toFixed(1)}) vx:${bl.vx} vy:${bl.vy} | transform a:${tf.a.toFixed(2)} b:${tf.b.toFixed(2)} c:${tf.c.toFixed(2)} d:${tf.d.toFixed(2)} e:${tf.e.toFixed(1)} f:${tf.f.toFixed(1)}`);
    }
    drawBullet(bl);
    for (const p of players) {
      if (!p.alive) continue;
      if (Math.hypot(bl.x - p.x, bl.y - p.y) < 16) {
        if (p.shield > 0) {
          sfx('shield-bounce'); spawnShieldBounce(p.x, p.y);
          p.shield = Math.max(0, p.shield - 6000);
          bl.vx *= -1; bl.vy *= -0.8; bl.counted = true; break;
        }
        if (p.invincible > 0) continue;
        sfx('hit'); spawnExplosion(bl.x, bl.y, '#ffff44');
        p.lives--; p.invincible = 120; updateHUD();
        if (p.lives <= 0) { p.alive = false; checkGameOver(); }
        return false;
      }
    }
    // Dodge tracking — bullet slipped past the player without hitting
    for (const p of players) {
      if (p.alive && !bl.counted && bl.x < p.x) {
        bl.counted = true;
        if (Math.abs(bl.y - p.y) < 60) {
          p.dodges++;
          if (p.dodges >= 18) awardExtraLife(p);
        }
      }
    }
    return true;
  });

  particles = particles.filter(p => {
    p.x+=p.vx; p.y+=p.vy; p.life-=(p.decay||0.025); p.vx*=0.97; p.vy*=0.97;
    if (p.life<=0) return false;
    ctx.save(); ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); ctx.fill(); ctx.restore();
    return true;
  });

  document.getElementById('score-display').textContent = 'SCORE: ' + Math.floor(score);

  // Send authoritative state to joiner
  if (onlineMode === 'host' && conn && conn.open && ts - lastStateSend > 50) {
    lastStateSend = ts;
    try {
      conn.send({
        type: 'state',
        p1: serializePlayer(players[0]),
        p2: players[1] ? serializePlayer(players[1]) : null,
        asteroids: asteroids.map(a => ({ x:a.x, y:a.y, rot:a.rot, size:a.size, pts:a.pts, cracks:a.cracks, craters:a.craters })),
        bullets: bullets.map(b => ({ x:b.x, y:b.y, vx:b.vx, vy:b.vy })),
        particles: particles.map(p => ({ x:p.x, y:p.y, life:p.life, color:p.color, size:p.size })),
        score, gameActive,
        cave: cave ? { gap:cave.gap, center:cave.center, slideOffset:cave.slideOffset, hillScrollOffset:cave.hillScrollOffset||0, segs:cave.segs, turrets:cave.turrets } : null,
        caveTime,
        shieldPowerup: shieldPowerup ? { x:shieldPowerup.x, y:shieldPowerup.y } : null
      });
    } catch(sendErr) {}
  }
  } catch(e) { console.error('gameLoop error:', e); }
}

function serializePlayer(p) {
  return { x:p.x, y:p.y, vx:p.vx, vy:p.vy, lives:p.lives, alive:p.alive, invincible:p.invincible, shield:p.shield||0, trail:p.trail.slice(0, 8) };
}

function generateRoomCode() {
  return Math.random().toString(36).slice(2, 8);
}

function setupHost() {
  if (peer) { try { peer.destroy(); } catch(e){} peer = null; }
  const code = generateRoomCode();
  const panel = document.getElementById('online-panel');
  panel.style.display = 'block';
  document.getElementById('join-input-row').style.display = 'none';
  document.getElementById('host-id-display').style.display = 'none';
  document.getElementById('online-status').textContent = 'CREATING ROOM...';

  peer = new Peer(code);
  peer.on('open', id => {
    document.getElementById('online-status').textContent = 'SHARE THIS CODE';
    document.getElementById('host-id-display').style.display = 'block';
    document.getElementById('host-id-display').textContent = id.toUpperCase();
  });
  peer.on('connection', c => {
    conn = c;
    document.getElementById('online-status').textContent = 'PLAYER 2 CONNECTED · STARTING...';
    c.on('open', () => {
      onlineMode = 'host';
      panel.style.display = 'none';
      startGame(2);
    });
    c.on('data', data => {
      if (data.type === 'input') remoteInput = data;
    });
    c.on('close', () => { conn = null; if (gameActive) endGame(); });
  });
  peer.on('error', err => {
    document.getElementById('online-status').textContent = 'Error: ' + err.type + '. Try again.';
    if (err.type === 'unavailable-id') setTimeout(setupHost, 300);
  });
}

function setupJoiner(code) {
  if (peer) { try { peer.destroy(); } catch(e){} peer = null; }
  const normalCode = code.trim().toLowerCase();
  document.getElementById('online-status').textContent = 'CONNECTING...';

  peer = new Peer();
  peer.on('open', () => {
    conn = peer.connect(normalCode);
    conn.on('open', () => {
      onlineMode = 'joiner';
      document.getElementById('online-panel').style.display = 'none';
      document.getElementById('p1-lives').style.display = 'none';
      document.getElementById('p2-lives').style.display = 'block';
      overlay.style.display = 'none';
      gameActive = false;
    });
    conn.on('data', data => {
      if (data.type === 'state') {
        remoteState = data;
        if (data.gameActive && overlay.style.display !== 'none') overlay.style.display = 'none';
      } else if (data.type === 'extralife') {
        sfx('extra-life'); showExtraLifeMsg();
      }
    });
    conn.on('close', () => {
      conn = null; onlineMode = false; remoteState = null;
      document.getElementById('online-status').textContent = 'Disconnected from host.';
      document.getElementById('online-panel').style.display = 'block';
      document.getElementById('p1-lives').style.display = 'block';
      document.getElementById('p2-lives').style.display = 'none';
      overlay.style.display = 'flex';
    });
    conn.on('error', () => {
      document.getElementById('online-status').textContent = 'Connection failed. Check the code and try again.';
    });
  });
  peer.on('error', err => {
    document.getElementById('online-status').textContent = 'Connection failed: ' + err.type;
  });
}

function renderJoinerFrame(dt, ts) {
  // Send WASD input to host
  if (conn && conn.open) {
    conn.send({
      type: 'input',
      up:    keys['w'] || keys['W'],
      down:  keys['s'] || keys['S'],
      left:  keys['a'] || keys['A'],
      right: keys['d'] || keys['D']
    });
  }

  if (!remoteState) return;
  const st = remoteState;

  // Handle game over received from host
  if (!st.gameActive) {
    score = st.score;
    if (score > highScore) highScore = score;
    document.getElementById('last-score').style.display = 'block';
    document.getElementById('last-score').textContent = 'SCORE: ' + Math.floor(score);
    document.getElementById('hi-score-display').style.display = 'block';
    document.getElementById('hi-score-display').textContent = '🏆 BEST: ' + Math.floor(highScore);
    overlay.style.display = 'flex';
    remoteState = null;
    return;
  }

  // Sync cave globals so drawCaveWalls() works
  if (st.cave) { cave = st.cave; caveTime = st.caveTime; } else { cave = null; }

  // Draw game objects from host state
  st.asteroids.forEach(a => drawAsteroid(a));
  if (st.cave) drawCaveWalls();
  st.bullets.forEach(bl => drawBullet(bl));

  // Particles
  st.particles.forEach(p => {
    ctx.save(); ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fill(); ctx.restore();
  });

  if (st.shieldPowerup) drawShieldPowerup(st.shieldPowerup);

  // Draw only P2 ship (joiner's own ship)
  if (st.p2 && st.p2.alive) {
    st.p2.trail.forEach((pt, i) => {
      ctx.globalAlpha = (1 - i / 8) * 0.3;
      ctx.fillStyle = P2_COLORS.trail;
      ctx.beginPath(); ctx.arc(pt.x - i * 4, pt.y, 4 - i * 0.4, 0, Math.PI * 2); ctx.fill();
    });
    ctx.globalAlpha = 1;
    const alpha = st.p2.invincible > 0 ? (Math.sin(st.p2.invincible * 0.5) > 0 ? 0.4 : 1) : 1;
    drawShip({ ...st.p2, colors: P2_COLORS }, alpha);
    if (st.p2.shield > 0) drawShieldEffect(st.p2);
  }

  // HUD
  document.getElementById('score-display').textContent = 'SCORE: ' + Math.floor(st.score);
  if (st.p2) document.getElementById('p2-lives').textContent = heartStr(st.p2.lives, '🧡');
}

function startGame(n) {
  if (onlineMode === 'joiner') return;
  if (AC.state === 'suspended') AC.resume();
  numPlayers = n;
  document.getElementById('p2-lives').style.display = (n === 2 && onlineMode !== 'host') ? 'block' : 'none';
  document.getElementById('p1-lives').style.display = 'block';
  document.getElementById('last-score').style.display = 'none';
  document.getElementById('hi-score-display').style.display = 'none';
  overlay.style.display = 'none';
  initGame();
}

document.getElementById('btn-1p').onclick = () => { if (!gameActive && !onlineMode) startGame(1); };

document.getElementById('btn-host').onclick = () => {
  if (onlineMode === 'host' && conn && conn.open && !gameActive) {
    // Already connected — just restart
    startGame(2);
  } else {
    onlineMode = false;
    setupHost();
  }
};

document.getElementById('btn-join-online').onclick = () => {
  onlineMode = false;
  document.getElementById('online-panel').style.display = 'block';
  document.getElementById('host-id-display').style.display = 'none';
  document.getElementById('join-input-row').style.display = 'block';
  document.getElementById('online-status').textContent = 'TYPE THE HOST CODE';
};

document.getElementById('btn-join-connect').onclick = () => {
  const code = document.getElementById('peer-id-input').value;
  if (code.trim()) setupJoiner(code);
};

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === 'd' || e.key === 'D') { debugMode = !debugMode; console.log('Debug mode:', debugMode); }
  if ((e.key === 'p' || e.key === 'P') && !e.repeat) togglePause();
});
document.addEventListener('keyup',   e => { keys[e.key] = false; });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (AC.state === 'suspended') AC.resume();
  Array.from(e.touches).forEach(t => {
    if (t.clientY < H/2 && t.clientX < W/2) touchUp = true;
    if (t.clientY >= H/2 && t.clientX < W/2) touchDown = true;
    if (t.clientX >= W/2 && t.clientY < H/2) { touchUp = true; touchRight = true; }
    if (t.clientX >= W/2 && t.clientY >= H/2) { touchDown = true; touchRight = true; }
  });
}, {passive: false});
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (e.touches.length === 0) { touchUp=false; touchDown=false; touchLeft=false; touchRight=false; }
}, {passive: false});

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
